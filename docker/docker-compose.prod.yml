# ============================================================================
# AssetHub — Production Docker Compose
# ============================================================================
# Prerequisites:
#   1. Copy .env.template → .env and fill in all values.
#   2. Read docs/operations/DEPLOYMENT.md for the full setup guide.
#
# Start:   docker compose -f docker/docker-compose.prod.yml up -d
# Stop:    docker compose -f docker/docker-compose.prod.yml down
# Rebuild: docker compose -f docker/docker-compose.prod.yml up -d --build
# Logs:    docker compose -f docker/docker-compose.prod.yml logs -f
# ============================================================================

services:

  # ---------- PostgreSQL 16 ---------------------------------------------------
  postgres:
    image: postgres:16.6-alpine
    container_name: assethub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      # Keycloak DB credentials (used by init-keycloak-db.sh)
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER:-keycloak}
      KEYCLOAK_DB_PASSWORD_FILE: /run/secrets/keycloak_db_password
    secrets:
      - postgres_password
      - keycloak_db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-keycloak-db.sh:/docker-entrypoint-initdb.d/init-keycloak-db.sh:ro
    # In production, do NOT expose the port externally. Only internal services
    # need to reach PostgreSQL. Uncomment the line below only for debugging.
    # ports:
    #   - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
          pids: 100
    # Security hardening
    user: "70:70"  # postgres user in alpine
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ---------- MinIO (S3-compatible object storage) ----------------------------
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: assethub-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    secrets:
      - minio_root_password
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    # Expose only the Console port on localhost for initial bucket setup.
    # After setup, comment out or remove.
    # ports:
    #   - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://minio:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
          pids: 100
    # Security hardening
    user: "65534:65534"  # nobody user (MinIO needs no specific user)
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ---------- Keycloak (OIDC provider) ----------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.1.0
    container_name: assethub-keycloak
    restart: unless-stopped
    environment:
      # Database — separate 'keycloak' database with dedicated user
      # (created automatically by docker/init-keycloak-db.sh on first start)
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD_FILE: /run/secrets/keycloak_db_password

      # Admin bootstrap (KC_BOOTSTRAP_* is the non-deprecated form for Keycloak 26+)
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD_FILE: /run/secrets/keycloak_admin_password

      # Production hostname — must match the URL users see in the browser.
      # Keycloak embeds this in tokens; the app validates it.
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME}
      KC_HOSTNAME_STRICT: "true"

      # Proxy / TLS — assumes a reverse proxy (Nginx, Traefik, Caddy)
      # terminates HTTPS and forwards to Keycloak on port 8080 (HTTP).
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"

      # Secrets for realm import (media-realm.json)
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_TESTUSER_PASSWORD: ${KEYCLOAK_TESTUSER_PASSWORD}
      KEYCLOAK_ADMIN_USER_PASSWORD: ${KEYCLOAK_ADMIN_USER_PASSWORD}
      KEYCLOAK_SEED_PASSWORD: ${KEYCLOAK_SEED_PASSWORD}
    secrets:
      - keycloak_admin_password
      - keycloak_db_password
      - keycloak_client_secret
    volumes:
      - keycloakdata:/opt/keycloak/data
      - ../keycloak/import:/opt/keycloak/data/import:ro
    # Note: --import-realm is idempotent in Keycloak 26+ (skips if realm exists).
    # This adds minimal startup overhead (~100ms) but simplifies deployment.
    # For zero-overhead in existing deployments, remove --import-realm after first run.
    command:
      - start
      - --import-realm
      - --health-enabled=true
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 2>/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 120s
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
          pids: 200
    # Security hardening
    user: "1000:1000"  # keycloak runs as UID 1000
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ---------- Redis (Distributed Cache) ----------------------------------------
  redis:
    image: redis:7.4-alpine
    container_name: assethub-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --maxmemory
      - 200mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
      - --appendonly
      - "no"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" --no-auth-warning ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
          pids: 50
    # Security hardening
    user: "999:999"  # redis user in alpine
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /data:size=256M,uid=999,gid=999
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ---------- AssetHub API + Blazor UI ----------------------------------------
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        # Trust the local dev CA so the API container can validate Keycloak's
        # self-signed cert during OIDC discovery. Default 1 here because this
        # compose file is what the team uses for prod-like local runs; real
        # production builds should set this to 0 (or omit the build arg).
        TRUST_LOCAL_DEV_CERT: "${TRUST_LOCAL_DEV_CERT:-1}"
    container_name: assethub-api
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Europe/Stockholm}
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: https://+:7252
      ASPNETCORE_Kestrel__Certificates__Default__Path: /app/certs/dev-cert.pfx
      ASPNETCORE_Kestrel__Certificates__Default__Password: "${ASPNETCORE_Kestrel__Certificates__Default__Password}"
      # AllowedHosts overrides the ${APP_HOSTNAME} placeholder in
      # appsettings.Production.json (ASP.NET Core doesn't substitute ${} in JSON).
      # The internal names (localhost, api) are needed for the Docker health check.
      AllowedHosts: "${APP_HOSTNAME};localhost;api"

      # Database
      ConnectionStrings__Postgres: "Server=postgres;Port=5432;Database=${POSTGRES_DB};User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"
      # Keycloak's database — UserLookupService queries user_entity directly here.
      ConnectionStrings__KeycloakDb: "Server=postgres;Port=5432;Database=keycloak;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"

      # Keycloak OIDC
      Keycloak__Authority: "https://${KEYCLOAK_HOSTNAME}/realms/media"
      Keycloak__ClientId: "${KEYCLOAK_CLIENT_ID}"
      Keycloak__ClientSecret: "${KEYCLOAK_CLIENT_SECRET}"
      Keycloak__RequireHttpsMetadata: "true"
      Keycloak__AdminUsername: "${KEYCLOAK_ADMIN_API_USERNAME}"
      Keycloak__AdminPassword: "${KEYCLOAK_ADMIN_API_PASSWORD}"
      Keycloak__AdminClientId: "${KEYCLOAK_ADMIN_CLIENT_ID:-admin-cli}"
      Keycloak__AdminClientSecret: "${KEYCLOAK_ADMIN_CLIENT_SECRET:-}"
      # AllowAdminPasswordGrant: required when AdminClientSecret is empty.
      # The admin credentials above are used with the password grant (OAuth ROPC).
      # Preferred upgrade path: create a Keycloak service account, set
      # KEYCLOAK_ADMIN_CLIENT_SECRET, and remove this flag.
      Keycloak__AllowAdminPasswordGrant: "${KEYCLOAK_ALLOW_ADMIN_PASSWORD_GRANT:-true}"

      # MinIO — internal endpoint (container-to-container)
      MinIO__Endpoint: "minio:9000"
      MinIO__AccessKey: "${MINIO_ACCESS_KEY}"
      MinIO__SecretKey: "${MINIO_SECRET_KEY}"
      MinIO__BucketName: "${MINIO_BUCKET_NAME}"
      MinIO__UseSSL: "false"
      # Public endpoint for presigned download URLs (what browsers use).
      # Leave MINIO_PUBLIC_URL blank if MinIO is not directly exposed.
      MinIO__PublicUrl: "${MINIO_PUBLIC_URL:-}"
      MinIO__PublicUseSSL: "${MINIO_PUBLIC_USE_SSL:-true}"

      # ClamAV malware scanning
      ClamAV__Enabled: "${CLAMAV_ENABLED:-true}"
      ClamAV__Host: "clamav"
      ClamAV__Port: "3310"
      ClamAV__TimeoutMs: "120000"
      ClamAV__ChunkSize: "262144"

      # RabbitMQ
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "${RABBITMQ_DEFAULT_USER}"
      RabbitMQ__Password: "${RABBITMQ_DEFAULT_PASS}"

      # Application
      App__BaseUrl: "${APP_BASE_URL}"
      App__MaxUploadSizeMb: "${APP_MAX_UPLOAD_SIZE_MB:-500}"
      App__DefaultPageSize: "${APP_DEFAULT_PAGE_SIZE:-50}"

      # Email
      Email__Enabled: "${EMAIL_ENABLED:-false}"
      Email__SmtpHost: "${EMAIL_SMTP_HOST:-}"
      Email__SmtpPort: "${EMAIL_SMTP_PORT:-587}"
      Email__SmtpUsername: "${EMAIL_SMTP_USERNAME:-}"
      Email__SmtpPassword: "${EMAIL_SMTP_PASSWORD:-}"
      Email__FromAddress: "${EMAIL_FROM_ADDRESS:-}"
      Email__FromName: "${EMAIL_FROM_NAME:-AssetHub}"

      # Image / Video Processing
      ImageProcessing__ThumbnailWidth: "${IMAGE_THUMBNAIL_WIDTH:-200}"
      ImageProcessing__ThumbnailHeight: "${IMAGE_THUMBNAIL_HEIGHT:-200}"
      ImageProcessing__MediumWidth: "${IMAGE_MEDIUM_WIDTH:-800}"
      ImageProcessing__MediumHeight: "${IMAGE_MEDIUM_HEIGHT:-800}"
      ImageProcessing__JpegQuality: "${IMAGE_JPEG_QUALITY:-85}"
      ImageProcessing__PosterFrameSeconds: "${VIDEO_POSTER_FRAME_SECONDS:-5}"
      ImageProcessing__PosterWidth: "${VIDEO_POSTER_WIDTH:-800}"
      ImageProcessing__PosterQuality: "${VIDEO_POSTER_QUALITY:-5}"

      # OpenTelemetry
      OpenTelemetry__Enabled: "${OTEL_ENABLED:-true}"
      OpenTelemetry__OtlpEndpoint: "http://aspire-dashboard:18889"
      OpenTelemetry__SamplingRatio: "${OTEL_SAMPLING_RATIO:-0.1}"

      # Redis
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD},abortConnect=false"

      # ASP.NET Data Protection — PFX cert shared between api and worker so
      # cookies / antiforgery tokens / DP-signed payloads round-trip correctly.
      DataProtection__CertificatePath: /run/secrets/dp_cert
    secrets:
      - dp_cert
    volumes:
      - ../certs:/app/certs:ro
    ports:
      - "127.0.0.1:7252:7252"
    healthcheck:
      test: ["CMD", "curl", "-sfk", "https://api:7252/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      clamav:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend
      - observability
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
          pids: 200
    # Security hardening
    user: "1654:1654"  # .NET 'app' user (set in Dockerfile, reinforced here)
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=2G,uid=1654,gid=1654
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ---------- Background Worker (Wolverine + RabbitMQ) -------------------------
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.Worker
    container_name: assethub-worker
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Europe/Stockholm}
      ASPNETCORE_ENVIRONMENT: Production
      App__BaseUrl: "${APP_BASE_URL}"
      ConnectionStrings__Postgres: "Server=postgres;Port=5432;Database=${POSTGRES_DB};User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"
      # Keycloak's database — UserLookupService queries user_entity directly here.
      ConnectionStrings__KeycloakDb: "Server=postgres;Port=5432;Database=keycloak;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"
      MinIO__Endpoint: "minio:9000"
      MinIO__AccessKey: "${MINIO_ACCESS_KEY}"
      MinIO__SecretKey: "${MINIO_SECRET_KEY}"
      MinIO__BucketName: "${MINIO_BUCKET_NAME}"
      MinIO__UseSSL: "false"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "${RABBITMQ_DEFAULT_USER}"
      RabbitMQ__Password: "${RABBITMQ_DEFAULT_PASS}"
      ImageProcessing__ThumbnailWidth: "${IMAGE_THUMBNAIL_WIDTH:-200}"
      ImageProcessing__ThumbnailHeight: "${IMAGE_THUMBNAIL_HEIGHT:-200}"
      ImageProcessing__MediumWidth: "${IMAGE_MEDIUM_WIDTH:-800}"
      ImageProcessing__MediumHeight: "${IMAGE_MEDIUM_HEIGHT:-800}"
      ImageProcessing__JpegQuality: "${IMAGE_JPEG_QUALITY:-85}"
      ImageProcessing__PosterFrameSeconds: "${VIDEO_POSTER_FRAME_SECONDS:-5}"
      ImageProcessing__PosterWidth: "${VIDEO_POSTER_WIDTH:-800}"
      ImageProcessing__PosterQuality: "${VIDEO_POSTER_QUALITY:-5}"

      # OpenTelemetry
      OpenTelemetry__Enabled: "${OTEL_ENABLED:-true}"
      OpenTelemetry__OtlpEndpoint: "http://aspire-dashboard:18889"
      OpenTelemetry__SamplingRatio: "${OTEL_SAMPLING_RATIO:-0.1}"

      # Redis
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD},abortConnect=false"

      # ASP.NET Data Protection — same PFX as api so DP-signed tokens are
      # verifiable by both processes (magic links, unsubscribe URLs, etc.).
      DataProtection__CertificatePath: /run/secrets/dp_cert
    secrets:
      - dp_cert
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend
      - observability
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
          pids: 200
    # Security hardening
    user: "1654:1654"  # .NET 'app' user (set in Dockerfile, reinforced here)
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=2G,uid=1654,gid=1654
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── RabbitMQ (Message Broker) ───────────────────────────────────────────────
  # HA-ready: uses persistent volume, quorum queues, and Erlang cookie secret.
  # To scale to a cluster, add rabbitmq2/rabbitmq3 services with the same
  # Erlang cookie and RABBITMQ_CLUSTER_NODES environment variable.
  rabbitmq:
    build:
      context: .
      dockerfile: Dockerfile.RabbitMQ
    image: assethub-rabbitmq:local
    container_name: assethub-rabbitmq
    hostname: rabbitmq  # stable hostname required for clustering
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      # Quorum queues are the default for HA — they replicate across cluster nodes.
      # This sets the default queue type for new queues created by applications.
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit default_queue_type quorum"
    secrets:
      - rabbitmq_erlang_cookie
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
          pids: 256
    # Security hardening
    user: "100:101"  # rabbitmq user (entrypoint detects non-root, skips su-exec)
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=512M,uid=100,gid=101
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── ClamAV (Malware Scanning) ────────────────────────────────────────────────
  clamav:
    build:
      context: .
      dockerfile: Dockerfile.ClamAV
    container_name: assethub-clamav
    environment:
      # Increase size limits for large media uploads (defaults: 25M/400M/1000M)
      CLAMD_CONF_StreamMaxLength: "1600M"
      CLAMD_CONF_MaxFileSize: "1600M"
      CLAMD_CONF_MaxScanSize: "1600M"
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 300s
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 3G
          pids: 100
    # Security hardening
    user: "100:101"  # clamav user (entrypoint detects non-root, skips chown/gosu)
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /run/clamav:size=1M,uid=100,gid=101
      - /tmp:size=512M,uid=100,gid=101
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    restart: unless-stopped

  # ── Observability ────────────────────────────────────────────────────────────

  # .NET Aspire Dashboard — single container for traces, metrics, and structured logs
  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.0
    container_name: assethub-aspire-dashboard
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
    # Expose only on localhost in production (access via reverse proxy)
    # ports:
    #   - "127.0.0.1:18888:18888"
    networks:
      - observability
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
          pids: 100
    # Security hardening
    user: "1654:1654"  # .NET 'app' user
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64M,uid=1654,gid=1654
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
  keycloakdata:
  redisdata:
  rabbitmqdata:

networks:
  # Backend network - database and storage services only
  backend:
    driver: bridge
  # Observability network - monitoring and tracing
  observability:
    driver: bridge
# ============================================================================
# Network Segmentation
# ============================================================================
# Services are isolated into separate networks for defense-in-depth:
#   - backend: postgres, minio, clamav, keycloak (internal data stores)
#   - observability: aspire-dashboard (monitoring)
#
# The api and worker services bridge both networks to access data stores
# and export telemetry. This limits blast radius if any service is compromised.
# ============================================================================

# ============================================================================
# Docker Secrets
# ============================================================================
# Store sensitive credentials as Docker secrets instead of environment variables.
#
# Setup:
#   mkdir -p secrets && chmod 700 secrets
#   echo "your-postgres-password" > secrets/postgres_password
#   echo "your-keycloak-admin-password" > secrets/keycloak_admin_password
#   echo "your-keycloak-db-password" > secrets/keycloak_db_password
#   echo "your-minio-root-password" > secrets/minio_root_password
#   echo "your-keycloak-client-secret" > secrets/keycloak_client_secret
#   openssl rand -hex 32 > secrets/rabbitmq_erlang_cookie
#   # Data Protection PFX (no password — the cert itself is the secret):
#   openssl req -x509 -newkey rsa:4096 -keyout /tmp/dp.key -out /tmp/dp.crt \
#     -days 3650 -nodes -subj "/CN=assethub-dp" && \
#     openssl pkcs12 -export -out secrets/dp.pfx \
#       -inkey /tmp/dp.key -in /tmp/dp.crt -passout pass: && \
#     rm /tmp/dp.key /tmp/dp.crt
#   chmod 600 secrets/*
#
# Services that support _FILE suffix (Postgres, MinIO) will automatically
# read the secret from the file. For others, secrets are mounted at
# /run/secrets/<name> and read by the application or entrypoint script.
# ============================================================================

secrets:
  postgres_password:
    file: ./secrets/postgres_password
  keycloak_admin_password:
    file: ./secrets/keycloak_admin_password
  keycloak_db_password:
    file: ./secrets/keycloak_db_password
  minio_root_password:
    file: ./secrets/minio_root_password
  keycloak_client_secret:
    file: ./secrets/keycloak_client_secret
  rabbitmq_erlang_cookie:
    file: ./secrets/rabbitmq_erlang_cookie
  dp_cert:
    file: ./secrets/dp.pfx