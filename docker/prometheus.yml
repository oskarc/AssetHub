# Prometheus configuration for AssetHub
# Scrapes metrics from API and Worker services
#
# SECURITY NOTE: The /metrics endpoint is protected by network isolation.
# Only internal Docker network services can reach it. Prometheus connects
# container-to-container (api:7252) which is NOT exposed externally.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'assethub'

# Alerting (optional - configure Alertmanager for production alerts)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

scrape_configs:
  # ── AssetHub API ─────────────────────────────────────────────────────────────
  # Production: API runs HTTP internally (reverse proxy terminates TLS)
  # Development: API runs HTTPS with dev certs — CA mounted from /certs
  - job_name: 'assethub-api'
    static_configs:
      - targets: ['api.assethub.local:7252']
    # Development uses HTTPS with proper CA verification
    # For production (HTTP behind reverse proxy), change scheme to 'http' and remove tls_config
    scheme: https
    tls_config:
      ca_file: /etc/prometheus/certs/dev-cert.crt
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # ── Prometheus self-monitoring ───────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── Jaeger metrics (optional) ────────────────────────────────────────────────
  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14269']
    metrics_path: /metrics
