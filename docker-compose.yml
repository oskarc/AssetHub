services:
  postgres:
    image: postgres:16-alpine
    container_name: assethub-postgres
    environment:
      POSTGRES_DB: assethub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev_password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-keycloak-db.sh:/docker-entrypoint-initdb.d/init-keycloak-db.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - assethub-network

  minio:
    image: minio/minio:latest
    container_name: assethub-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_dev_password
    volumes:
      - miniodata:/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /minio --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - assethub-network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: assethub-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres_dev_password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_HOSTNAME: keycloak.assethub.local
      KC_HTTPS_KEY_STORE_FILE: /opt/keycloak/certs/dev-cert.pfx
      KC_HTTPS_KEY_STORE_PASSWORD: devpass123
      KC_HTTPS_KEY_STORE_TYPE: PKCS12
      KC_HTTP_ENABLED: 'true'
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import:ro
      - ./certs:/opt/keycloak/certs:ro
    ports:
      - "8080:8080"
      - "8443:8443"
    command:
      - start-dev
      - --import-realm
      - --health-enabled=true
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      assethub-network:
        aliases:
          - keycloak.assethub.local
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8443; echo -e 'GET /health/ready HTTP/1.1\nHost: localhost\nConnection: close\n\n' >&3; timeout 2 cat <&3 | grep -q 'UP' || exec 3<>/dev/tcp/localhost/8080; echo -e 'GET /health/ready HTTP/1.1\nHost: localhost\nConnection: close\n\n' >&3; cat <&3 | grep -q 'UP'"]
      interval: 15s
      timeout: 10s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: assethub-api
    environment:
      TZ: Europe/Stockholm
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: https://+:7252
      ASPNETCORE_Kestrel__Certificates__Default__Path: /app/certs/dev-cert.pfx
      ASPNETCORE_Kestrel__Certificates__Default__Password: devpass123
      ConnectionStrings__Postgres: "Server=postgres;Port=5432;Database=assethub;User Id=postgres;Password=postgres_dev_password;"
      ConnectionStrings__KeycloakDb: "Server=postgres;Port=5432;Database=keycloak;User Id=postgres;Password=postgres_dev_password;"
      Keycloak__Authority: "https://keycloak.assethub.local:8443/realms/media"
      Keycloak__ClientId: "assethub-app"
      Keycloak__ClientSecret: "VxBiV29QVchYHFzD5N62l43fTXbTMzSl"
      Keycloak__AdminUsername: "admin"
      Keycloak__AdminPassword: "admin123"
      MinIO__Endpoint: "minio:9000"
      MinIO__AccessKey: "minioadmin"
      MinIO__SecretKey: "minioadmin_dev_password"
      MinIO__BucketName: "assethub-dev"
      MinIO__UseSSL: "false"
      MinIO__PublicUrl: "localhost:9000"
      MinIO__PublicUseSSL: "false"
      Hangfire__ConnectionString: "Server=postgres;Port=5432;Database=assethub;User Id=postgres;Password=postgres_dev_password;"
      App__BaseUrl: "https://assethub.local:7252"
    volumes:
      - ./certs:/app/certs:ro
    ports:
      - "7252:7252"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - assethub-network
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.Worker
    container_name: assethub-worker
    environment:
      TZ: Europe/Stockholm
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: "Server=postgres;Port=5432;Database=assethub;User Id=postgres;Password=postgres_dev_password;"
      MinIO__Endpoint: "minio:9000"
      MinIO__AccessKey: "minioadmin"
      MinIO__SecretKey: "minioadmin_dev_password"
      MinIO__BucketName: "assethub-dev"
      MinIO__UseSSL: "false"
      Hangfire__ConnectionString: "Server=postgres;Port=5432;Database=assethub;User Id=postgres;Password=postgres_dev_password;"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - assethub-network
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:

networks:
  assethub-network:
    driver: bridge
