# Default env file for local development. Override with:
#   docker compose --env-file .env.prod up

services:
  postgres:
    image: postgres:16-alpine
    container_name: assethub-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-keycloak-db.sh:/docker-entrypoint-initdb.d/init-keycloak-db.sh:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - assethub-network

  minio:
    image: minio/minio:latest
    container_name: assethub-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/minio
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    command: server /minio --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - assethub-network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: assethub-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: keycloak.assethub.local
      KC_HTTPS_KEY_STORE_FILE: /opt/keycloak/certs/dev-cert.pfx
      KC_HTTPS_KEY_STORE_PASSWORD: ${KC_HTTPS_KEY_STORE_PASSWORD}
      KC_HTTPS_KEY_STORE_TYPE: PKCS12
      KC_HTTP_ENABLED: 'true'
    volumes:
      - keycloakdata:/opt/keycloak/data
      - ../keycloak/import:/opt/keycloak/data/import:ro
      - ../certs:/opt/keycloak/certs:ro
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:8443:8443"
    command:
      - start-dev
      - --import-realm
      - --health-enabled=true
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      assethub-network:
        aliases:
          - keycloak.assethub.local
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8443; echo -e 'GET /health/ready HTTP/1.1\nHost: localhost\nConnection: close\n\n' >&3; timeout 2 cat <&3 | grep -q 'UP' || exec 3<>/dev/tcp/localhost/8080; echo -e 'GET /health/ready HTTP/1.1\nHost: localhost\nConnection: close\n\n' >&3; cat <&3 | grep -q 'UP'"]
      interval: 15s
      timeout: 10s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: assethub-api
    environment:
      TZ: Europe/Stockholm
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: https://+:7252
      ASPNETCORE_Kestrel__Certificates__Default__Path: /app/certs/dev-cert.pfx
      ASPNETCORE_Kestrel__Certificates__Default__Password: ${ASPNETCORE_Kestrel__Certificates__Default__Password}
      ConnectionStrings__Postgres: "Server=postgres;Port=5432;Database=${POSTGRES_DB};User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"
      ConnectionStrings__KeycloakDb: "Server=postgres;Port=5432;Database=keycloak;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"
      Keycloak__Authority: "https://keycloak.assethub.local:8443/realms/media"
      Keycloak__ClientId: "${KEYCLOAK_CLIENT_ID}"
      Keycloak__ClientSecret: "${KEYCLOAK_CLIENT_SECRET}"
      Keycloak__AdminUsername: "${KEYCLOAK_ADMIN_API_USERNAME}"
      Keycloak__AdminPassword: "${KEYCLOAK_ADMIN_API_PASSWORD}"
      MinIO__Endpoint: "minio:9000"
      MinIO__AccessKey: "${MINIO_ACCESS_KEY}"
      MinIO__SecretKey: "${MINIO_SECRET_KEY}"
      MinIO__BucketName: "${MINIO_BUCKET_NAME}"
      MinIO__UseSSL: "false"
      MinIO__PublicUrl: "localhost:9000"
      MinIO__PublicUseSSL: "false"
      Hangfire__ConnectionString: "Server=postgres;Port=5432;Database=${POSTGRES_DB};User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"
      App__BaseUrl: "https://assethub.local:7252"
    volumes:
      - ../certs:/app/certs:ro
    ports:
      - "127.0.0.1:7252:7252"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - assethub-network
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.Worker
    container_name: assethub-worker
    environment:
      TZ: Europe/Stockholm
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: "Server=postgres;Port=5432;Database=${POSTGRES_DB};User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"
      MinIO__Endpoint: "minio:9000"
      MinIO__AccessKey: "${MINIO_ACCESS_KEY}"
      MinIO__SecretKey: "${MINIO_SECRET_KEY}"
      MinIO__BucketName: "${MINIO_BUCKET_NAME}"
      MinIO__UseSSL: "false"
      Hangfire__ConnectionString: "Server=postgres;Port=5432;Database=${POSTGRES_DB};User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - assethub-network
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: assethub-mailpit
    ports:
      - "127.0.0.1:8025:8025"
      - "127.0.0.1:1025:1025"
    networks:
      - assethub-network
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
  keycloakdata:

networks:
  assethub-network:
    driver: bridge
