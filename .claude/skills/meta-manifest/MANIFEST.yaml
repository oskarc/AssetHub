gap_queue:
  - gap_id: gap-001
    concern: No `blazor-web-app` type-category kit exists between base and AssetHub
    surfaced_by: manual
    surfaced_in: AssetHub initial fill on v0.4 (2026-05-01)
    description: |
      Patterns transferable across Blazor-Server / Clean-Arch / EF Core systems live at the project
      layer (CLAUDE.md) instead of one tier up. Sealed-by-default services, ServiceResult over thrown
      business exceptions, RequireAntiforgeryUnlessBearer on mutating cookie+bearer groups,
      optimistic-UI rollback, Sonar suppression discipline, the pre-commit grep sweep — all would
      apply unchanged to any system in this category. Each AssetHub fork has to re-discover them
      until they are lifted into a type-category kit.
    candidate_level: pattern
    priority: high
    status: open

  - gap_id: gap-002
    concern: skill-builder abstraction loop has never been formally run against CLAUDE.md
    surfaced_by: manual
    surfaced_in: AssetHub initial fill on v0.4 (2026-05-01)
    description: |
      ~38 KB of guardrails accumulated organically. Some are genuine product details (PAT scopes,
      Wolverine queue names, MinIO bucket conventions); some are patterns; a handful are principles
      ("manifest is read-only", "never silently abstract"). Level-mixing per skill-builder
      Anti-patterns. Resolving gap-001 should consume this gap.
    candidate_level: pattern
    priority: high
    status: open

  - gap_id: gap-003
    concern: Information architecture and navigation decisions are silent at every layer
    surfaced_by: manual
    surfaced_in: AssetHub initial fill on v0.4 (2026-05-01)
    description: |
      No node, skill, or CLAUDE.md section addresses how to decide page hierarchy, sidebar grouping,
      breadcrumb strategy, or navigation patterns. /implementation-ux-check audits heuristics for what
      already exists but not the design step that creates it.
    candidate_level: principle
    priority: medium
    status: open

  - gap_id: gap-004
    concern: Design-system / visual-feel guidance is reduced to "MudBlazor 8 only"
    surfaced_by: manual
    surfaced_in: AssetHub initial fill on v0.4 (2026-05-01)
    description: |
      No tokens, no spacing scale, no colour usage rules, no typographic hierarchy.
      /implementation-ux-check audits behaviour but not visual coherence. New components inherit
      MudBlazor defaults plus ad-hoc decisions.
    candidate_level: pattern
    priority: medium
    status: open

  - gap_id: gap-005
    concern: Verification node not formalised — coverage exists in aggregate but not as a single concern
    surfaced_by: manual
    surfaced_in: AssetHub initial fill on v0.4 (2026-05-01)
    description: |
      Eight implementation-* / pattern-* skills (a11y, ux, i18n, di, migration, add-tests,
      regression-baseline, ui-verify) plus the pre-commit grep sweep cover verification. There is no
      single node that says "before declaring a feature done, run these in this order" — the
      workflow is implicit in CLAUDE.md and the available-skills list. Risk: a feature ships missing
      a step simply because nobody looked at the full set.
    candidate_level: pattern
    priority: medium
    status: open

  - gap_id: gap-006
    concern: Concern overlap between /pattern-brainstorm and /grill-me
    surfaced_by: manual
    surfaced_in: AssetHub initial fill on v0.4 (2026-05-01)
    description: |
      Two skills target the same phase / concern with different tones. skill-builder Step 0 says
      "different concern → new skill"; if these are the same concern with different intensities they
      should either merge or split with a clearly-bounded distinction (e.g. /pattern-brainstorm for
      unclear problems, /grill-me when a plan exists and needs holes poked).
    candidate_level: product detail
    priority: low
    status: open

  - gap_id: gap-007
    concern: /grill-me lives in user-space only — not committed to the repo
    surfaced_by: manual
    surfaced_in: AssetHub initial fill on v0.4 (2026-05-01)
    description: |
      Teammates and CI do not inherit it. If it carries judgment this project relies on, it should
      live in `.claude/skills/pattern-grill-me/SKILL.md` like the others (and adopt the layer-prefix
      convention). Same risk applies to any future user-space skill the project comes to depend on.
    candidate_level: product detail
    priority: low
    status: open

  # Add new gaps below as they surface:
