# Grafana dashboard provisioning
# Automatically loads dashboards from the dashboards folder

apiVersion: 1

providers:
  - name: 'AssetHub Dashboards'
    orgId: 1
    folder: 'AssetHub'
    folderUid: 'assethub'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
