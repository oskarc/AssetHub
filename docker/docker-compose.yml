# Default env file for local development. Override with:
#   docker compose --env-file .env.prod up

services:
  postgres:
    image: postgres:16.6-alpine
    container_name: assethub-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Keycloak DB credentials (used by init-keycloak-db.sh)
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER:-keycloak}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-keycloak-db.sh:/docker-entrypoint-initdb.d/init-keycloak-db.sh:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
          pids: 100
    # Security hardening
    user: "70:70"  # postgres user in alpine
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: assethub-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/minio
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    command: server /minio --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://minio:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
          pids: 100
    # Security hardening
    user: "65534:65534"  # nobody user (MinIO needs no specific user)
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.0
    container_name: assethub-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_TESTUSER_PASSWORD: ${KEYCLOAK_TESTUSER_PASSWORD}
      KEYCLOAK_ADMIN_USER_PASSWORD: ${KEYCLOAK_ADMIN_USER_PASSWORD}
      KEYCLOAK_SEED_PASSWORD: ${KEYCLOAK_SEED_PASSWORD}
      KC_HOSTNAME: keycloak.assethub.local
      KC_HTTPS_KEY_STORE_FILE: /opt/keycloak/certs/dev-cert.pfx
      KC_HTTPS_KEY_STORE_PASSWORD: ${KC_HTTPS_KEY_STORE_PASSWORD}
      KC_HTTPS_KEY_STORE_TYPE: PKCS12
      KC_HTTP_ENABLED: 'true'
    volumes:
      - keycloakdata:/opt/keycloak/data
      - ../keycloak/import:/opt/keycloak/data/import:ro
      - ../keycloak/themes:/opt/keycloak/themes:ro
      - ../certs:/opt/keycloak/certs:ro
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:8443:8443"
    command:
      - start-dev
      - --import-realm
      - --health-enabled=true
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      backend:
        aliases:
          - keycloak.assethub.local
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 2>/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
          pids: 200
    # Security hardening
    user: "1000:1000"  # keycloak runs as UID 1000
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: assethub-api
    environment:
      TZ: Europe/Stockholm
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: https://+:7252
      ASPNETCORE_Kestrel__Certificates__Default__Path: /app/certs/dev-cert.pfx
      ASPNETCORE_Kestrel__Certificates__Default__Password: ${ASPNETCORE_Kestrel__Certificates__Default__Password}
      ConnectionStrings__Postgres: "Server=postgres;Port=5432;Database=${POSTGRES_DB};User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"
      ConnectionStrings__KeycloakDb: "Server=postgres;Port=5432;Database=keycloak;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"
      Keycloak__Authority: "https://keycloak.assethub.local:8443/realms/media"
      Keycloak__ClientId: "${KEYCLOAK_CLIENT_ID}"
      Keycloak__ClientSecret: "${KEYCLOAK_CLIENT_SECRET}"
      Keycloak__AdminUsername: "${KEYCLOAK_ADMIN_API_USERNAME}"
      Keycloak__AdminPassword: "${KEYCLOAK_ADMIN_API_PASSWORD}"
      Keycloak__AdminClientId: "${KEYCLOAK_ADMIN_CLIENT_ID:-admin-cli}"
      Keycloak__AdminClientSecret: "${KEYCLOAK_ADMIN_CLIENT_SECRET:-}"
      MinIO__Endpoint: "minio:9000"
      MinIO__AccessKey: "${MINIO_ACCESS_KEY}"
      MinIO__SecretKey: "${MINIO_SECRET_KEY}"
      MinIO__BucketName: "${MINIO_BUCKET_NAME}"
      MinIO__UseSSL: "false"
      MinIO__PublicUrl: "localhost:9000"
      MinIO__PublicUseSSL: "false"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "${RABBITMQ_DEFAULT_USER:-guest}"
      RabbitMQ__Password: "${RABBITMQ_DEFAULT_PASS:-guest}"
      App__BaseUrl: "https://assethub.local:7252"
      ClamAV__Enabled: "${CLAMAV_ENABLED:-true}"
      ClamAV__Host: "clamav"
      ClamAV__Port: "3310"
      ClamAV__TimeoutMs: "120000"
      ClamAV__ChunkSize: "262144"
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD},abortConnect=false"
      OpenTelemetry__OtlpEndpoint: "http://aspire-dashboard:18889"
    volumes:
      - ../certs:/app/certs:ro
    ports:
      - "127.0.0.1:7252:7252"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      clamav:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      backend:
        aliases:
          - api
          - api.assethub.local
      observability:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
          pids: 200
    # Security hardening
    user: "1654:1654"  # .NET 'app' user (set in Dockerfile, reinforced here)
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=2G,uid=1654,gid=1654

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.Worker
    container_name: assethub-worker
    environment:
      TZ: Europe/Stockholm
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: "Server=postgres;Port=5432;Database=${POSTGRES_DB};User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"
      MinIO__Endpoint: "minio:9000"
      MinIO__AccessKey: "${MINIO_ACCESS_KEY}"
      MinIO__SecretKey: "${MINIO_SECRET_KEY}"
      MinIO__BucketName: "${MINIO_BUCKET_NAME}"
      MinIO__UseSSL: "false"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "${RABBITMQ_DEFAULT_USER:-guest}"
      RabbitMQ__Password: "${RABBITMQ_DEFAULT_PASS:-guest}"
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD},abortConnect=false"
      OpenTelemetry__OtlpEndpoint: "http://aspire-dashboard:18889"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend
      - observability
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
          pids: 200
    # Security hardening
    user: "1654:1654"  # .NET 'app' user (set in Dockerfile, reinforced here)
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=2G,uid=1654,gid=1654

  # ── RabbitMQ (Message Broker) ───────────────────────────────────────────────
  rabbitmq:
    build:
      context: .
      dockerfile: Dockerfile.RabbitMQ
    image: assethub-rabbitmq:local
    container_name: assethub-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
          pids: 256
    # Security hardening
    user: "100:101"  # rabbitmq user (entrypoint detects non-root, skips su-exec)
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /var/lib/rabbitmq:size=256M,uid=100,gid=101
      - /tmp:size=64M,uid=100,gid=101

  # ── Redis (Distributed Cache) ──────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: assethub-redis
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --maxmemory
      - 200mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
      - --appendonly
      - "no"
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
          pids: 50
    # Security hardening
    user: "999:999"  # redis user in alpine
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /data:size=256M,uid=999,gid=999

  mailpit:
    image: axllent/mailpit:v1.21
    container_name: assethub-mailpit
    ports:
      - "127.0.0.1:8025:8025"
      - "127.0.0.1:1025:1025"
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
          pids: 50
    # Security hardening
    user: "65534:65534"  # nobody user
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64M,uid=65534,gid=65534

  # ── ClamAV (Malware Scanning) ────────────────────────────────────────────────
  clamav:
    build:
      context: .
      dockerfile: Dockerfile.ClamAV
    container_name: assethub-clamav
    environment:
      # Increase size limits for large media uploads (defaults: 25M/400M/1000M)
      CLAMD_CONF_StreamMaxLength: "1600M"
      CLAMD_CONF_MaxFileSize: "1600M"
      CLAMD_CONF_MaxScanSize: "1600M"
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 300s
    networks:
      - backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 3G
          pids: 100
    # Security hardening
    user: "100:101"  # clamav user (entrypoint detects non-root, skips chown/gosu)
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /run/clamav:size=1M,uid=100,gid=101
      - /tmp:size=512M,uid=100,gid=101

  # ── Observability ────────────────────────────────────────────────────────────

  # .NET Aspire Dashboard — single container for traces, metrics, and structured logs
  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.0
    container_name: assethub-aspire-dashboard
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
    ports:
      - "127.0.0.1:18888:18888"   # Dashboard UI
    networks:
      - observability
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
          pids: 100
    # Security hardening
    user: "1654:1654"  # .NET 'app' user
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64M,uid=1654,gid=1654

volumes:
  pgdata:
  miniodata:
  keycloakdata:
  redisdata:

networks:
  # Backend network - database and storage services only
  backend:
    driver: bridge
  # Observability network - monitoring and tracing
  observability:
    driver: bridge
