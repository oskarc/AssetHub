# Default env file for local development. Override with:
#   docker compose --env-file .env.prod up

services:
  postgres:
    image: postgres:16.6-alpine
    container_name: assethub-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Keycloak DB credentials (used by init-keycloak-db.sh)
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER:-keycloak}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-keycloak-db.sh:/docker-entrypoint-initdb.d/init-keycloak-db.sh:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - assethub-network

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: assethub-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/minio
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    command: server /minio --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://minio:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - assethub-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.0
    container_name: assethub-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_TESTUSER_PASSWORD: ${KEYCLOAK_TESTUSER_PASSWORD}
      KEYCLOAK_ADMIN_USER_PASSWORD: ${KEYCLOAK_ADMIN_USER_PASSWORD}
      KC_HOSTNAME: keycloak.assethub.local
      KC_HTTPS_KEY_STORE_FILE: /opt/keycloak/certs/dev-cert.pfx
      KC_HTTPS_KEY_STORE_PASSWORD: ${KC_HTTPS_KEY_STORE_PASSWORD}
      KC_HTTPS_KEY_STORE_TYPE: PKCS12
      KC_HTTP_ENABLED: 'true'
    volumes:
      - keycloakdata:/opt/keycloak/data
      - ../keycloak/import:/opt/keycloak/data/import:ro
      - ../keycloak/themes:/opt/keycloak/themes:ro
      - ../certs:/opt/keycloak/certs:ro
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:8443:8443"
    command:
      - start-dev
      - --import-realm
      - --health-enabled=true
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      assethub-network:
        aliases:
          - keycloak.assethub.local
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 2>/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: assethub-api
    environment:
      TZ: Europe/Stockholm
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: https://+:7252
      ASPNETCORE_Kestrel__Certificates__Default__Path: /app/certs/dev-cert.pfx
      ASPNETCORE_Kestrel__Certificates__Default__Password: ${ASPNETCORE_Kestrel__Certificates__Default__Password}
      ConnectionStrings__Postgres: "Server=postgres;Port=5432;Database=${POSTGRES_DB};User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"
      ConnectionStrings__KeycloakDb: "Server=postgres;Port=5432;Database=keycloak;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"
      Keycloak__Authority: "https://keycloak.assethub.local:8443/realms/media"
      Keycloak__ClientId: "${KEYCLOAK_CLIENT_ID}"
      Keycloak__ClientSecret: "${KEYCLOAK_CLIENT_SECRET}"
      Keycloak__AdminUsername: "${KEYCLOAK_ADMIN_API_USERNAME}"
      Keycloak__AdminPassword: "${KEYCLOAK_ADMIN_API_PASSWORD}"
      Keycloak__AdminClientId: "${KEYCLOAK_ADMIN_CLIENT_ID:-admin-cli}"
      Keycloak__AdminClientSecret: "${KEYCLOAK_ADMIN_CLIENT_SECRET:-}"
      MinIO__Endpoint: "minio:9000"
      MinIO__AccessKey: "${MINIO_ACCESS_KEY}"
      MinIO__SecretKey: "${MINIO_SECRET_KEY}"
      MinIO__BucketName: "${MINIO_BUCKET_NAME}"
      MinIO__UseSSL: "false"
      MinIO__PublicUrl: "localhost:9000"
      MinIO__PublicUseSSL: "false"
      Hangfire__ConnectionString: "Server=postgres;Port=5432;Database=${POSTGRES_DB};User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"
      App__BaseUrl: "https://assethub.local:7252"
      ClamAV__Enabled: "${CLAMAV_ENABLED:-true}"
      ClamAV__Host: "clamav"
      ClamAV__Port: "3310"
      OpenTelemetry__OtlpEndpoint: "http://jaeger:4317"
    volumes:
      - ../certs:/app/certs:ro
    ports:
      - "127.0.0.1:7252:7252"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      clamav:
        condition: service_healthy
    networks:
      assethub-network:
        aliases:
          - api
          - api.assethub.local
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.Worker
    container_name: assethub-worker
    environment:
      TZ: Europe/Stockholm
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: "Server=postgres;Port=5432;Database=${POSTGRES_DB};User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"
      MinIO__Endpoint: "minio:9000"
      MinIO__AccessKey: "${MINIO_ACCESS_KEY}"
      MinIO__SecretKey: "${MINIO_SECRET_KEY}"
      MinIO__BucketName: "${MINIO_BUCKET_NAME}"
      MinIO__UseSSL: "false"
      Hangfire__ConnectionString: "Server=postgres;Port=5432;Database=${POSTGRES_DB};User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"
      OpenTelemetry__OtlpEndpoint: "http://jaeger:4317"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - assethub-network
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: assethub-mailpit
    ports:
      - "127.0.0.1:8025:8025"
      - "127.0.0.1:1025:1025"
    networks:
      - assethub-network
    restart: unless-stopped

  # ── ClamAV (Malware Scanning) ────────────────────────────────────────────────
  clamav:
    image: clamav/clamav:1.5.1
    container_name: assethub-clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 300s
    networks:
      - assethub-network
    restart: unless-stopped

  # ── Observability Stack ──────────────────────────────────────────────────────

  # Jaeger - Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: assethub-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:16686:16686"   # Jaeger UI
      - "127.0.0.1:4317:4317"     # OTLP gRPC
      - "127.0.0.1:4318:4318"     # OTLP HTTP
    networks:
      assethub-network:
        aliases:
          - jaeger.assethub.local
    restart: unless-stopped

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: assethub-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
      - ../certs/dev-cert.crt:/etc/prometheus/certs/dev-cert.crt:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      assethub-network:
        aliases:
          - prometheus.assethub.local
    restart: unless-stopped

  # Grafana - Visualization & Dashboards
  grafana:
    image: grafana/grafana:10.3.0
    container_name: assethub-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
      - jaeger
    networks:
      assethub-network:
        aliases:
          - grafana.assethub.local
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
  keycloakdata:
  prometheusdata:
  grafanadata:

networks:
  assethub-network:
    driver: bridge
