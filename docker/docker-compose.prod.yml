# ============================================================================
# AssetHub — Production Docker Compose
# ============================================================================
# Prerequisites:
#   1. Copy .env.template → .env and fill in all values.
#   2. Read docs/DEPLOYMENT.md for the full setup guide.
#
# Start:   docker compose -f docker/docker-compose.prod.yml up -d
# Stop:    docker compose -f docker/docker-compose.prod.yml down
# Rebuild: docker compose -f docker/docker-compose.prod.yml up -d --build
# Logs:    docker compose -f docker/docker-compose.prod.yml logs -f
# ============================================================================

services:

  # ---------- PostgreSQL 16 ---------------------------------------------------
  postgres:
    image: postgres:16.6-alpine
    container_name: assethub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Keycloak DB credentials (used by init-keycloak-db.sh)
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER:-keycloak}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-keycloak-db.sh:/docker-entrypoint-initdb.d/init-keycloak-db.sh:ro
    # In production, do NOT expose the port externally. Only internal services
    # need to reach PostgreSQL. Uncomment the line below only for debugging.
    # ports:
    #   - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ---------- MinIO (S3-compatible object storage) ----------------------------
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: assethub-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    # Expose only the Console port on localhost for initial bucket setup.
    # After setup, comment out or remove.
    # ports:
    #   - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://minio:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ---------- Keycloak (OIDC provider) ----------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.1.0
    container_name: assethub-keycloak
    restart: unless-stopped
    environment:
      # Database — separate 'keycloak' database with dedicated user
      # (created automatically by docker/init-keycloak-db.sh on first start)
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}

      # Admin bootstrap (KC_BOOTSTRAP_* is the non-deprecated form for Keycloak 26+)
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

      # Production hostname — must match the URL users see in the browser.
      # Keycloak embeds this in tokens; the app validates it.
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME}
      KC_HOSTNAME_STRICT: "true"

      # Proxy / TLS — assumes a reverse proxy (Nginx, Traefik, Caddy)
      # terminates HTTPS and forwards to Keycloak on port 8080 (HTTP).
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"

      # Secrets for realm import (media-realm.json)
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_TESTUSER_PASSWORD: ${KEYCLOAK_TESTUSER_PASSWORD}
      KEYCLOAK_ADMIN_USER_PASSWORD: ${KEYCLOAK_ADMIN_USER_PASSWORD}
    volumes:
      - keycloakdata:/opt/keycloak/data
      - ../keycloak/import:/opt/keycloak/data/import:ro
    # Note: --import-realm is idempotent in Keycloak 26+ (skips if realm exists).
    # This adds minimal startup overhead (~100ms) but simplifies deployment.
    # For zero-overhead in existing deployments, remove --import-realm after first run.
    command:
      - start
      - --import-realm
      - --health-enabled=true
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 2>/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 120s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 768M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ---------- AssetHub API + Blazor UI ----------------------------------------
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: assethub-api
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Europe/Stockholm}
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:7252

      # Database
      ConnectionStrings__Postgres: "Server=postgres;Port=5432;Database=${POSTGRES_DB};User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"

      # Keycloak OIDC
      Keycloak__Authority: "https://${KEYCLOAK_HOSTNAME}/realms/media"
      Keycloak__ClientId: "${KEYCLOAK_CLIENT_ID}"
      Keycloak__ClientSecret: "${KEYCLOAK_CLIENT_SECRET}"
      Keycloak__RequireHttpsMetadata: "true"
      Keycloak__AdminUsername: "${KEYCLOAK_ADMIN_API_USERNAME}"
      Keycloak__AdminPassword: "${KEYCLOAK_ADMIN_API_PASSWORD}"
      Keycloak__AdminClientId: "${KEYCLOAK_ADMIN_CLIENT_ID:-admin-cli}"
      Keycloak__AdminClientSecret: "${KEYCLOAK_ADMIN_CLIENT_SECRET:-}"

      # MinIO — internal endpoint (container-to-container)
      MinIO__Endpoint: "minio:9000"
      MinIO__AccessKey: "${MINIO_ACCESS_KEY}"
      MinIO__SecretKey: "${MINIO_SECRET_KEY}"
      MinIO__BucketName: "${MINIO_BUCKET_NAME}"
      MinIO__UseSSL: "false"
      # Public endpoint for presigned download URLs (what browsers use).
      # Leave MINIO_PUBLIC_URL blank if MinIO is not directly exposed.
      MinIO__PublicUrl: "${MINIO_PUBLIC_URL:-}"
      MinIO__PublicUseSSL: "${MINIO_PUBLIC_USE_SSL:-true}"

      # ClamAV malware scanning
      ClamAV__Enabled: "${CLAMAV_ENABLED:-true}"
      ClamAV__Host: "clamav"
      ClamAV__Port: "3310"

      # Hangfire
      Hangfire__ConnectionString: "Server=postgres;Port=5432;Database=${POSTGRES_DB};User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"

      # Application
      App__BaseUrl: "${APP_BASE_URL}"
      App__MaxUploadSizeMb: "${APP_MAX_UPLOAD_SIZE_MB:-500}"
      App__DefaultPageSize: "${APP_DEFAULT_PAGE_SIZE:-50}"

      # Email
      Email__Enabled: "${EMAIL_ENABLED:-false}"
      Email__SmtpHost: "${EMAIL_SMTP_HOST:-}"
      Email__SmtpPort: "${EMAIL_SMTP_PORT:-587}"
      Email__SmtpUsername: "${EMAIL_SMTP_USERNAME:-}"
      Email__SmtpPassword: "${EMAIL_SMTP_PASSWORD:-}"
      Email__UseSsl: "${EMAIL_USE_SSL:-true}"
      Email__FromAddress: "${EMAIL_FROM_ADDRESS:-}"
      Email__FromName: "${EMAIL_FROM_NAME:-AssetHub}"

      # Image / Video Processing
      ImageProcessing__ThumbnailWidth: "${IMAGE_THUMBNAIL_WIDTH:-200}"
      ImageProcessing__ThumbnailHeight: "${IMAGE_THUMBNAIL_HEIGHT:-200}"
      ImageProcessing__MediumWidth: "${IMAGE_MEDIUM_WIDTH:-800}"
      ImageProcessing__MediumHeight: "${IMAGE_MEDIUM_HEIGHT:-800}"
      ImageProcessing__JpegQuality: "${IMAGE_JPEG_QUALITY:-85}"
      ImageProcessing__PosterFrameSeconds: "${VIDEO_POSTER_FRAME_SECONDS:-5}"
      ImageProcessing__PosterWidth: "${VIDEO_POSTER_WIDTH:-800}"
      ImageProcessing__PosterQuality: "${VIDEO_POSTER_QUALITY:-5}"

      # OpenTelemetry
      OpenTelemetry__Enabled: "${OTEL_ENABLED:-true}"
      OpenTelemetry__OtlpEndpoint: "http://jaeger:4317"
      OpenTelemetry__SamplingRatio: "${OTEL_SAMPLING_RATIO:-0.1}"
    ports:
      - "127.0.0.1:7252:7252"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://api:7252/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      clamav:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 1G
    # Security hardening
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=100M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ---------- Hangfire Background Worker --------------------------------------
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.Worker
    container_name: assethub-worker
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Europe/Stockholm}
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: "Server=postgres;Port=5432;Database=${POSTGRES_DB};User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"
      MinIO__Endpoint: "minio:9000"
      MinIO__AccessKey: "${MINIO_ACCESS_KEY}"
      MinIO__SecretKey: "${MINIO_SECRET_KEY}"
      MinIO__BucketName: "${MINIO_BUCKET_NAME}"
      MinIO__UseSSL: "false"
      Hangfire__ConnectionString: "Server=postgres;Port=5432;Database=${POSTGRES_DB};User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};"
      ImageProcessing__ThumbnailWidth: "${IMAGE_THUMBNAIL_WIDTH:-200}"
      ImageProcessing__ThumbnailHeight: "${IMAGE_THUMBNAIL_HEIGHT:-200}"
      ImageProcessing__MediumWidth: "${IMAGE_MEDIUM_WIDTH:-800}"
      ImageProcessing__MediumHeight: "${IMAGE_MEDIUM_HEIGHT:-800}"
      ImageProcessing__JpegQuality: "${IMAGE_JPEG_QUALITY:-85}"
      ImageProcessing__PosterFrameSeconds: "${VIDEO_POSTER_FRAME_SECONDS:-5}"
      ImageProcessing__PosterWidth: "${VIDEO_POSTER_WIDTH:-800}"
      ImageProcessing__PosterQuality: "${VIDEO_POSTER_QUALITY:-5}"

      # OpenTelemetry
      OpenTelemetry__Enabled: "${OTEL_ENABLED:-true}"
      OpenTelemetry__OtlpEndpoint: "http://jaeger:4317"
      OpenTelemetry__SamplingRatio: "${OTEL_SAMPLING_RATIO:-0.1}"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 1G
    # Security hardening
    cap_drop:
      - ALL
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=100M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── ClamAV (Malware Scanning) ────────────────────────────────────────────────
  clamav:
    image: clamav/clamav:1.5.1
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 300s
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    restart: unless-stopped

  # ── Observability Stack ──────────────────────────────────────────────────────

  # Jaeger - Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: assethub-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: "badger"
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: "/badger/data"
      BADGER_DIRECTORY_KEY: "/badger/key"
    volumes:
      - jaegerdata:/badger
    # Expose only on localhost in production (access via reverse proxy)
    # ports:
    #   - "127.0.0.1:16686:16686"
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    restart: unless-stopped

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: assethub-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      # --web.enable-lifecycle intentionally omitted in production.
      # Use SIGHUP to reload config: docker kill -s HUP assethub-prometheus
    # Expose only on localhost in production
    # ports:
    #   - "127.0.0.1:9090:9090"
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    restart: unless-stopped

  # Grafana - Visualization & Dashboards
  grafana:
    image: grafana/grafana:10.3.0
    container_name: assethub-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "${GRAFANA_ROOT_URL:-http://localhost:3000}"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    # Expose only on localhost in production
    # ports:
    #   - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
      - jaeger
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
  keycloakdata:
  jaegerdata:
  prometheusdata:
  grafanadata:

networks:
  internal:
    driver: bridge
# ============================================================================
# Docker Secrets (optional, recommended for production)
# ============================================================================
# To use secrets instead of environment variables for sensitive credentials:
#
# 1. Create secret files (ensure restrictive permissions: chmod 600):
#    mkdir -p secrets
#    echo "your-postgres-password" > secrets/postgres_password
#    echo "your-keycloak-admin-password" > secrets/keycloak_admin_password
#    echo "your-keycloak-db-password" > secrets/keycloak_db_password
#
# 2. Uncomment the secrets section below and update service environment vars
#    to use _FILE suffix (Postgres) or mount secrets as volumes (Keycloak).
#
# secrets:
#   postgres_password:
#     file: ./secrets/postgres_password
#   keycloak_admin_password:
#     file: ./secrets/keycloak_admin_password
#   keycloak_db_password:
#     file: ./secrets/keycloak_db_password
#
# For Postgres, replace POSTGRES_PASSWORD with:
#   POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
#
# For Keycloak, use an init script or entrypoint to read secrets.
# ============================================================================