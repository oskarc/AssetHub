# ClamAV daemon configuration for AssetHub
# Based on container defaults with increased stream limits for large media files.

LogFile /var/log/clamav/clamd.log
LogTime yes
LocalSocket /tmp/clamd.sock
TCPSocket 3310
User clamav

# Increase StreamMaxLength to match app's max upload size (1500 MB).
# Default is 25M which causes "Broken pipe" errors on larger files.
StreamMaxLength 1600M
MaxFileSize 1600M
MaxScanSize 1600M
