# MANIFEST.yaml
# Instance data for the AssetHub project kit. Governed by SKILL.md in the same directory.
# Updated only through the skill-builder process with developer approval.

kit_identity:
  kit_name: assethub
  kit_type: project
  category: blazor-web-app
  version: 0.1
  parent_kit: meta-base-building-kit
  status: active
  last_filled: 2026-05-01

nodes:

  # ─── Base building kit (inherited meta layer) ────────────────────────────

  - id: base-contract
    concern: Contract before execution — three-tier proposal, approval gate, standard evolution report
    skill_file: meta-contract-before-execution/SKILL.md
    layer: meta
    phase: [pre-build, post-build]
    status: mature
    dependencies: []
    open_gaps:
      - Proposal format not yet templated for non-developer legibility
      - No guidance on handling partial approvals

  - id: base-skill-builder
    concern: Abstraction loop — classifying learnings, updating skills, raising the standard
    skill_file: meta-skill-builder/SKILL.md
    layer: meta
    phase: [post-build]
    status: mature
    dependencies: [base-contract]
    open_gaps:
      - No guidance on deprecating outdated nodes
      - Conflict resolution between two nodes covering overlapping concerns not addressed

  - id: base-manifest
    concern: Kit topology — node registry, coverage map, gap tracking, self-organisation
    skill_file: meta-manifest/SKILL.md
    data_file: meta-manifest/MANIFEST.yaml
    layer: meta
    phase: [pre-build]
    status: mature
    dependencies: []
    open_gaps:
      - Library forking process not defined
      - No versioning strategy for breaking changes to node schema

  # ─── Project instructions (catch-all index for CLAUDE.md) ────────────────

  - id: project-instructions
    concern: AssetHub-specific guardrails — Clean Arch boundaries, C# conventions, domain entities, services, repositories, API endpoints, Blazor UI, caching, worker, security, configuration, testing, Docker, Sonar discipline, pre-commit grep sweep
    skill_file: CLAUDE.md
    layer: implementation
    phase: [pre-build, during-build, post-build]
    status: thin
    dependencies: [base-contract, base-skill-builder, base-manifest]
    open_gaps:
      - Patterns transferable to other Blazor-Server / Clean-Arch / EF Core systems have not been abstracted into a `blazor-web-app` type-category kit (see gap-001)
      - Mixes principles, patterns, and product details in one document — level-mixing per skill-builder Anti-patterns (see gap-002)

  # ─── Pattern layer (stack-agnostic structural decisions) ─────────────────

  - id: pattern-brainstorm
    concern: Socratic interrogation of feature requests — surface real problem before code
    skill_file: pattern-brainstorm/SKILL.md
    layer: pattern
    phase: [pre-build]
    status: thin
    dependencies: []
    open_gaps:
      - Concern boundary with /grill-me unclear (see gap-006)

  - id: pattern-systematic-debug
    concern: Stack-agnostic debugging workflow — reproduce, isolate, hypothesise, test, fix, verify
    skill_file: pattern-systematic-debug/SKILL.md
    layer: pattern
    phase: [during-build]
    status: mature
    dependencies: []
    open_gaps: []

  - id: pattern-commit-scope
    concern: Decision support for splitting a branch into multiple commits
    skill_file: pattern-commit-scope/SKILL.md
    layer: pattern
    phase: [post-build]
    status: mature
    dependencies: []
    open_gaps: []

  - id: pattern-regression-baseline
    concern: Separating new test regressions from pre-existing failures
    skill_file: pattern-regression-baseline/SKILL.md
    layer: pattern
    phase: [post-build]
    status: mature
    dependencies: []
    open_gaps: []

  # ─── Implementation layer (post-build verification, stack-specific) ──────

  - id: implementation-a11y-check
    concern: Accessibility audit (WCAG 2.2 AA) of changed Blazor UI
    skill_file: implementation-a11y-check/SKILL.md
    layer: implementation
    phase: [post-build]
    status: mature
    dependencies: [project-instructions]
    open_gaps: []

  - id: implementation-ux-check
    concern: Usability review against Nielsen heuristics + AssetHub house rules
    skill_file: implementation-ux-check/SKILL.md
    layer: implementation
    phase: [post-build]
    status: mature
    dependencies: [project-instructions]
    open_gaps: []

  - id: implementation-i18n-check
    concern: Localisation key parity (en / sv) and hardcoded-string detection
    skill_file: implementation-i18n-check/SKILL.md
    layer: implementation
    phase: [post-build]
    status: mature
    dependencies: [project-instructions]
    open_gaps: []

  - id: implementation-di-check
    concern: DI registration consistency — Application interfaces vs Service / Infrastructure extensions
    skill_file: implementation-di-check/SKILL.md
    layer: implementation
    phase: [post-build]
    status: mature
    dependencies: [project-instructions]
    open_gaps: []

  - id: implementation-migration-check
    concern: EF Core migration safety audit before auto-migrate at startup
    skill_file: implementation-migration-check/SKILL.md
    layer: implementation
    phase: [post-build]
    status: mature
    dependencies: [project-instructions]
    open_gaps: []

  - id: implementation-add-tests
    concern: xUnit / bUnit test scaffolding for new or changed code
    skill_file: implementation-add-tests/SKILL.md
    layer: implementation
    phase: [post-build]
    status: mature
    dependencies: [project-instructions]
    open_gaps: []

  - id: implementation-ui-verify
    concern: E2E (Playwright) smoke-test mapping for changed Blazor UI
    skill_file: implementation-ui-verify/SKILL.md
    layer: implementation
    phase: [post-build]
    status: mature
    dependencies: [project-instructions]
    open_gaps: []

  - id: implementation-commit-and-push
    concern: Commit hygiene — review staged changes, run build / tests, compose why-focused commit message
    skill_file: implementation-commit-and-push/SKILL.md
    layer: implementation
    phase: [post-build]
    status: mature
    dependencies: [project-instructions]
    open_gaps: []

