version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: assethub-postgres
    environment:
      POSTGRES_DB: assethub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - assethub-network

  minio:
    image: minio/minio:latest
    container_name: assethub-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_dev_password
    volumes:
      - miniodata:/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /minio --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - assethub-network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: assethub-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/assethub
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres_dev_password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_HOSTNAME_STRICT_HTTPS: 'false'
      KC_PROXY_ADDRESS_FORWARDING: 'true'
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import:ro
    ports:
      - "8080:8080"
    command:
      - start-dev
      - --import-realm
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - assethub-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://keycloak:8080/health/ready"]
      interval: 15s
      timeout: 10s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: assethub-api
    environment:
      TZ: Europe/Stockholm
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:7252
      ConnectionStrings__Postgres: "Server=postgres;Port=5432;Database=assethub;User Id=postgres;Password=postgres_dev_password;"
      Keycloak__Authority: "http://keycloak:8080/realms/media"
      Keycloak__ClientId: "assethub-app"
      Keycloak__ClientSecret: "VxBiV29QVchYHFzD5N62l43fTXbTMzSl"
      MinIO__Endpoint: "minio:9000"
      MinIO__AccessKey: "minioadmin"
      MinIO__SecretKey: "minioadmin_dev_password"
      MinIO__BucketName: "assethub-dev"
      MinIO__UseSSL: "false"
      Hangfire__ConnectionString: "Server=postgres;Port=5432;Database=assethub;User Id=postgres;Password=postgres_dev_password;"
      App__BaseUrl: "http://localhost:7252"
    ports:
      - "7252:7252"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - assethub-network
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.Worker
    container_name: assethub-worker
    environment:
      TZ: Europe/Stockholm
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: "Server=postgres;Port=5432;Database=assethub;User Id=postgres;Password=postgres_dev_password;"
      MinIO__Endpoint: "minio:9000"
      MinIO__AccessKey: "minioadmin"
      MinIO__SecretKey: "minioadmin_dev_password"
      MinIO__BucketName: "assethub-dev"
      MinIO__UseSSL: "false"
      Hangfire__ConnectionString: "Server=postgres;Port=5432;Database=assethub;User Id=postgres;Password=postgres_dev_password;"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - assethub-network
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:

networks:
  assethub-network:
    driver: bridge
