# ============================================================================
# AssetHub — Nginx Reverse Proxy Configuration
# ============================================================================
# Prerequisites:
#   1. Replace YOUR_DOMAIN with your actual domain
#   2. Obtain TLS certificates (Let's Encrypt / certbot recommended)
#   3. Update ssl_certificate paths
#
# Usage:
#   nginx -t && nginx -s reload
# ============================================================================

upstream assethub_api {
    server api:7252;
    keepalive 32;
}

upstream keycloak {
    server keycloak:8080;
    keepalive 16;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # ── TLS ──────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security Headers ─────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Upload size (match App__MaxUploadSizeMb) ─────────────────────────
    client_max_body_size 500M;

    # ── Timeouts ─────────────────────────────────────────────────────────
    proxy_connect_timeout 10s;
    proxy_read_timeout    300s;  # Long for large uploads
    proxy_send_timeout    300s;

    # ── Shared proxy headers ─────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Blazor Server SignalR WebSocket ──────────────────────────────────
    location /_blazor {
        proxy_pass http://assethub_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # ── AssetHub API + Blazor UI ─────────────────────────────────────────
    location / {
        proxy_pass http://assethub_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
    }

    # ── Keycloak ─────────────────────────────────────────────────────────
    location /realms/ {
        proxy_pass http://keycloak;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /resources/ {
        proxy_pass http://keycloak;
    }

    location /js/ {
        proxy_pass http://keycloak;
    }

    # Keycloak Admin — restrict to internal IPs
    location /admin/ {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;
        proxy_pass http://keycloak;
    }

    # ── Health check endpoint (for load balancers) ───────────────────────
    location /health {
        proxy_pass http://assethub_api;
        access_log off;
    }
}
